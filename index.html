<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq HTML/JS Chat</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #2d2d2d;
            --text-color: #ffffff;
            --border-color: #444;
            --user-msg: #007bff;
            --bot-msg: #444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-right: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .sidebar h2 { margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; }
        
        input[type="password"], select, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: #1e1e1e;
            color: white;
            box-sizing: border-box;
        }

        /* Chat Container Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .message.user {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message.assistant {
            background-color: var(--bot-msg);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        /* Input Area Styles */
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--panel-bg);
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #218838; }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>⚙️ Configuration</h2>
        <div class="input-group">
            <label for="api-key">Groq API Key:</label>
            <input type="password" id="api-key" placeholder="gsk_...">
        </div>
        <div class="input-group">
            <label for="model-select">Model:</label>
            <select id="model-select">
                <option value="llama3-8b-8192">LLaMA3 8B</option>
                <option value="llama3-70b-8192">LLaMA3 70B</option>
                <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                <option value="gemma-7b-it">Gemma 7B</option>
            </select>
        </div>
        <p style="font-size: 12px; color: #aaa;">Your API key is only used locally in your browser and is not stored anywhere.</p>
    </div>

    <div class="main-content">
        <div class="chat-box" id="chat-box">
            <div class="message assistant">Hello! Please enter your API key in the sidebar, and let's start chatting.</div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        // Store conversation history
        let chatHistory = [];

        // Allow sending message with 'Enter' key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Add a message bubble to the chat UI
        function appendMessage(content, role) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.textContent = content;
            chatBox.appendChild(msgDiv);
            
            // Auto-scroll to the bottom
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;
            const text = userInput.value.trim();

            if (!apiKey) {
                alert("Please enter your Groq API Key in the sidebar.");
                return;
            }

            if (!text) return;

            // 1. Update UI and History with User Message
            appendMessage(text, 'user');
            chatHistory.push({ role: 'user', content: text });
            userInput.value = '';
            
            // Disable input while waiting
            userInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '...';

            try {
                // 2. Make the API Call to Groq
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: chatHistory
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || 'Unknown API Error');
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                // 3. Update UI and History with Assistant Message
                appendMessage(assistantMessage, 'assistant');
                chatHistory.push({ role: 'assistant', content: assistantMessage });

            } catch (error) {
                appendMessage(`Error: ${error.message}`, 'assistant');
                console.error("Groq API Error:", error);
            } finally {
                // Re-enable input
                userInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                userInput.focus();
            }
        }
    </script>
</body>
</html>
