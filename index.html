<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYPHER // 3D Interface</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    
    <style>
        :root {
            --bg-color: #0d0905;
            --panel-bg: #140d05;
            --text-main: #ffcc00; 
            --text-dim: #ff6600;  
            --user-msg: rgba(255, 204, 0, 0.05);
            --bot-msg: rgba(255, 102, 0, 0.08);
            --font-stack: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(255, 102, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 102, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Mobile Overlay */
        .mobile-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 40;
            backdrop-filter: blur(3px);
        }

        /* Sidebar Styles */
        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            padding: 25px;
            border-right: 1px solid var(--text-dim);
            box-shadow: inset -2px 0 15px rgba(255, 102, 0, 0.1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 50;
            transition: transform 0.3s ease-in-out;
            overflow-y: auto;
        }

        .sidebar h2 { 
            margin-top: 0; 
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 1px solid var(--text-dim);
            padding-bottom: 15px;
            text-shadow: 0 0 10px var(--text-main);
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn { display: none; background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 0; }

        /* 3D Canvas Container */
        #skull-canvas-container {
            width: 100%;
            height: 180px;
            margin: 10px 0 20px 0;
            border: 1px solid rgba(255, 102, 0, 0.2);
            background: radial-gradient(circle at center, rgba(255, 102, 0, 0.1) 0%, transparent 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* File Upload Styling */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
        }
        
        .upload-btn-wrapper .btn {
            border: 1px dashed var(--text-dim);
            color: var(--text-dim);
            background-color: transparent;
            padding: 8px 20px;
            border-radius: 0;
            font-size: 10px;
            font-weight: bold;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-btn-wrapper:hover .btn {
            background-color: rgba(255, 102, 0, 0.1);
            border-color: var(--text-main);
            color: var(--text-main);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
        input[type="password"], select, input[type="text"] {
            width: 100%; padding: 10px; border: 1px solid var(--text-dim); border-radius: 0; background-color: #000; color: var(--text-main); box-sizing: border-box; font-family: var(--font-stack); transition: all 0.3s ease;
        }
        input[type="password"]:focus, select:focus, input[type="text"]:focus { outline: none; border-color: var(--text-main); box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .controls { display: flex; gap: 10px; margin-top: 5px;}
        .controls button { padding: 8px; font-size: 10px; flex: 1; }

        /* Main Area Styles */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; height: 100%; }
        .mobile-header { display: none; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: var(--panel-bg); border-bottom: 1px solid var(--text-dim); z-index: 30; }
        .mobile-header .logo { font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 5px var(--text-main); }
        .chat-box { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .message { max-width: 85%; padding: 15px 20px; line-height: 1.5; white-space: pre-wrap; border-radius: 2px; border: 1px solid rgba(255, 102, 0, 0.1); word-wrap: break-word; }
        .message.user { background-color: var(--user-msg); align-self: flex-end; border-right: 3px solid var(--text-main); text-align: right; }
        .message.assistant { background-color: var(--bot-msg); align-self: flex-start; border-left: 3px solid var(--text-dim); box-shadow: 5px 5px 15px rgba(0,0,0,0.8); }
        .message-header { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; display: block; opacity: 0.9; font-weight: bold; }
        
        .chat-input-area { padding: 20px; border-top: 1px solid var(--text-dim); background-color: rgba(13, 9, 5, 0.95); display: flex; gap: 10px; }
        button { padding: 0 20px; background-color: transparent; color: var(--text-main); border: 1px solid var(--text-dim); cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-family: var(--font-stack); transition: all 0.2s ease; }
        button:hover { border-color: var(--text-main); background-color: rgba(255, 204, 0, 0.1); box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; background-color: transparent; box-shadow: none; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); }

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { position: absolute; top: 0; bottom: 0; left: 0; transform: translateX(-100%); width: 85%; }
            .sidebar.active { transform: translateX(0); }
            .mobile-overlay.active { display: block; }
            .close-btn { display: block; }
            .chat-input-area { flex-direction: column; }
            .chat-input-area input, .chat-input-area button { padding: 15px; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>

    <div class="mobile-overlay" id="mobile-overlay" onclick="toggleSettings()"></div>

    <div class="sidebar" id="sidebar">
        <h2>CYPHER <button class="close-btn" onclick="toggleSettings()">×</button></h2>

        <div id="skull-canvas-container"></div>
        
        <div class="upload-btn-wrapper">
            <button class="btn">Load Custom Skull (.STL / .OBJ)</button>
            <input type="file" id="model-upload" accept=".stl,.obj" />
        </div>
        
        <div class="input-group">
            <label for="api-key">Cypher Link Token:</label>
            <input type="password" id="api-key" placeholder="Enter API Key...">
        </div>
        
        <div class="input-group">
            <label for="model-select">Active Subroutine:</label>
            <select id="model-select">
                <option value="llama-3.3-70b-versatile">Cypher-Nexus (Flagship)</option>
                <option value="openai/gpt-oss-120b">Cypher-Logic (Reasoning)</option>
                <option value="llama-3.1-8b-instant">Cypher-Pulse (Instant)</option>
            </select>
        </div>

        <div class="controls">
            <button onclick="clearMemory()">Wipe Memory</button>
        </div>
    </div>

    <div class="main-content">
        <div class="mobile-header">
            <span class="logo">CYPHER // CORE</span>
            <button onclick="toggleSettings()" style="padding: 5px 10px; font-size: 12px;">[ SYS_CONFIG ]</button>
        </div>

        <div class="chat-box" id="chat-box"></div>
        
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="> XAVIER, await input..." onkeypress="handleKeyPress(event)" oninput="handleTyping()">
            <button id="send-btn" onclick="sendMessage()">TRANSMIT</button>
        </div>
    </div>

    <script>
        /* =========================================
           THREE.JS SETUP & MODEL LOADING
           ========================================= */
        const container = document.getElementById('skull-canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        let skullMesh = new THREE.Group();
        scene.add(skullMesh);

        const skullMaterial = new THREE.MeshStandardMaterial({
            color: 0xffaa00,
            emissive: 0x552200,
            wireframe: true, // Keep true for the holographic grid look
            wireframeLinewidth: 1,
            transparent: true,
            opacity: 0.8
        });

        // Default Procedural Skull (Loads before you upload yours)
        function createDefaultSkull() {
            const craniumGeo = new THREE.IcosahedronGeometry(2, 1);
            const cranium = new THREE.Mesh(craniumGeo, skullMaterial);
            cranium.position.y = 0.5;
            skullMesh.add(cranium);
            const jawGeo = new THREE.BoxGeometry(2.2, 1.2, 2);
            const jaw = new THREE.Mesh(jawGeo, skullMaterial);
            jaw.position.y = -1.2;
            jaw.position.z = 0.2;
            skullMesh.add(jaw);
        }
        createDefaultSkull();

        const ambientLight = new THREE.AmbientLight(0xff6600, 0.8);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffcc00, 2, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        camera.position.z = 7;

        let aiState = 'idle'; 
        let baseRotationSpeed = 0.005;

        // Custom File Upload Logic
        document.getElementById('model-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            const extension = file.name.split('.').pop().toLowerCase();

            reader.onload = function(e) {
                const contents = e.target.result;
                
                // Clear out the old skull
                scene.remove(skullMesh);
                skullMesh = new THREE.Group();
                scene.add(skullMesh);

                try {
                    let geometry;
                    if (extension === 'stl') {
                        const loader = new THREE.STLLoader();
                        geometry = loader.parse(contents);
                    } else if (extension === 'obj') {
                        const loader = new THREE.OBJLoader();
                        const obj = loader.parse(contents);
                        
                        // Extract geometry from the OBJ children
                        obj.traverse(function(child) {
                            if (child.isMesh) {
                                child.material = skullMaterial;
                                skullMesh.add(child);
                            }
                        });
                    }

                    if (geometry) {
                        const mesh = new THREE.Mesh(geometry, skullMaterial);
                        skullMesh.add(mesh);
                    }

                    // Auto-center and scale the user's uploaded model
                    const box = new THREE.Box3().setFromObject(skullMesh);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 4 / maxDim; // Fit it into camera view
                    
                    skullMesh.scale.set(scale, scale, scale);
                    skullMesh.position.sub(center.multiplyScalar(scale));

                    document.querySelector('.upload-btn-wrapper .btn').innerText = "Model Loaded Successfully";
                    setTimeout(() => {
                        document.querySelector('.upload-btn-wrapper .btn').innerText = "Load Custom Skull (.STL / .OBJ)";
                    }, 3000);

                } catch (err) {
                    console.error("Error loading model:", err);
                    alert("Error parsing 3D file. Please ensure it is a valid STL or OBJ.");
                    createDefaultSkull(); // Revert on failure
                }
            };

            if (extension === 'stl') {
                reader.readAsArrayBuffer(file);
            } else if (extension === 'obj') {
                reader.readAsText(file);
            } else {
                alert("Please upload an .STL or .OBJ file.");
            }
        });

        // Mouse Tracker for 3D Skull
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);

            if (aiState === 'idle') {
                // Skull slightly follows the mouse cursor
                skullMesh.rotation.y += (mouseX * 0.5 - skullMesh.rotation.y) * 0.05;
                skullMesh.rotation.x += (-mouseY * 0.5 - skullMesh.rotation.x) * 0.05;
                
                // Keep it breathing
                skullMesh.position.y = Math.sin(Date.now() * 0.001) * 0.2;
                skullMesh.scale.setScalar(skullMesh.scale.x); // Maintain uploaded scale
            } 
            else if (aiState === 'typing') {
                skullMesh.rotation.y += baseRotationSpeed * 5;
                skullMesh.position.x = (Math.random() - 0.5) * 0.1;
            } 
            else if (aiState === 'thinking') {
                skullMesh.rotation.y += 0.05;
                const pulse = 1 + Math.sin(Date.now() * 0.01) * 0.05;
                skullMesh.scale.setScalar(skullMesh.scale.x * pulse / skullMesh.scale.x); // Relative pulse
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            if(container.clientWidth > 0) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        });

        /* =========================================
           CHAT INTERFACE LOGIC
           ========================================= */
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');
        
        let typingTimeout;
        const systemPrompt = "You are Cypher, an advanced, highly intelligent cybernetic AI system. Your tone is sharp, analytical, and slightly edgy, fitting a cyberpunk aesthetic. The user's name is Xavier. Address him respectfully but maintaining your AI persona. Do not mention Groq.";

        function toggleSettings() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        let chatHistory = JSON.parse(localStorage.getItem('cypher_history')) || [
            { role: 'system', content: systemPrompt }
        ];

        function renderHistory() {
            chatBox.innerHTML = '';
            if (chatHistory.length === 1) {
                appendMessage("Initialization complete. Awaiting input stream from XAVIER.", 'assistant');
            }
            chatHistory.forEach(msg => {
                if (msg.role !== 'system') {
                    appendMessage(msg.content, msg.role, false);
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearMemory() {
            if(confirm("Are you sure you want to wipe Cypher's memory?")) {
                chatHistory = [{ role: 'system', content: systemPrompt }];
                localStorage.setItem('cypher_history', JSON.stringify(chatHistory));
                renderHistory();
                if(window.innerWidth <= 768) toggleSettings();
            }
        }

        function handleTyping() {
            aiState = 'typing';
            skullMaterial.emissive.setHex(0xaaaa00); 
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                aiState = 'idle'; 
                skullMaterial.emissive.setHex(0x552200); 
                skullMesh.position.x = 0; // Reset typing jitter
            }, 500);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function appendMessage(content, role, save = true) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            
            const header = document.createElement('span');
            header.classList.add('message-header');
            header.textContent = role === 'user' ? 'XAVIER // CLIENT' : 'CYPHER // CORE';
            
            const textNode = document.createTextNode(content);
            
            msgDiv.appendChild(header);
            msgDiv.appendChild(document.createElement('br'));
            msgDiv.appendChild(textNode);
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (save) {
                chatHistory.push({ role: role, content: content });
                localStorage.setItem('cypher_history', JSON.stringify(chatHistory));
            }
        }

        async function sendMessage() {
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;
            const text = userInput.value.trim();

            if (!apiKey) {
                alert("ERR: Link Token Required in SYS_CONFIG.");
                if(window.innerWidth <= 768) toggleSettings();
                return;
            }

            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            userInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = 'ROUTING...';
            
            aiState = 'thinking';
            skullMaterial.emissive.setHex(0xff3300); 
            skullMaterial.wireframeLinewidth = 2;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: chatHistory
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || 'Link Disconnected');
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                appendMessage(assistantMessage, 'assistant');

            } catch (error) {
                appendMessage(`SYS_ERR: ${error.message}`, 'assistant');
                console.error("Cypher Link Error:", error);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'TRANSMIT';
                
                aiState = 'idle';
                skullMaterial.emissive.setHex(0x552200);
                skullMaterial.wireframeLinewidth = 1;
                
                userInput.focus();
            }
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
