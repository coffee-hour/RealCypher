<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypher | Neural Mind Live</title>
    <style>
        :root {
            --obsidian: #0d0d0d;
            --amber: #ff8c00;
            --cyber-yellow: #ffff00;
            --orange: #ff4500;
            --cyan: #00ffff;
            --red: #ff0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--obsidian);
            color: var(--amber);
            font-family: 'Courier New', Courier, monospace;
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(255, 140, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 140, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--amber);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--amber);
        }

        .terminal {
            flex-grow: 1;
            background: rgba(13, 13, 13, 0.8);
            border: 1px solid var(--amber);
            display: flex;
            flex-direction: column;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
        }

        .chat-output {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--amber) transparent;
        }

        .chat-output::-webkit-scrollbar {
            width: 5px;
        }

        .chat-output::-webkit-scrollbar-thumb {
            background: var(--amber);
        }

        .message {
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .user-message::before { content: "> "; color: var(--cyber-yellow); }
        .ai-message::before { content: "CYPHER: "; color: var(--orange); font-weight: bold; }

        .input-area {
            display: flex;
            border-top: 1px solid var(--amber);
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--cyber-yellow);
            padding: 10px;
            font-family: inherit;
            outline: none;
        }

        button {
            background: var(--amber);
            border: none;
            color: var(--obsidian);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--cyber-yellow);
        }

        .status-bar {
            margin-top: 10px;
            font-size: 12px;
            display: flex;
            gap: 20px;
            color: var(--amber);
            opacity: 0.8;
        }

        .pulse {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>
    <div class="overlay"></div>
    <div class="grid-overlay"></div>

    <div class="ui-container">
        <header>
            <div>System: RealCypher v2.0.0</div>
            <div class="pulse">● Neural Link Active</div>
        </header>

        <div class="terminal">
            <div class="chat-output" id="chat-output">
                <div class="message ai-message">NEURAL MIND INITIALIZED. STATUS: OPTIMAL.</div>
                <div class="message ai-message">STANDING BY FOR COMMAND INPUT...</div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Execute command..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>

        <div class="status-bar">
            <span>Lat: <span id="stat-lat">--</span></span>
            <span>Nodes: 50/50</span>
            <span>Mapping: 3-STATE GLOW</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Config ---
        const COLORS = {
            background: 0x0d0d0d,
            amber: 0xff8c00,
            cyberYellow: 0xffff00,
            orange: 0xff4500,
            cyan: 0x00ffff,
            red: 0xff0000
        };

        const STATES = ['ACTIVE', 'PROCESSING', 'THREAT'];
        const NODE_COUNT = 50;

        // --- Scene Setup ---
        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(COLORS.background);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        // --- Neural Network Object ---
        class NeuralNetwork {
            constructor() {
                this.nodes = [];
                this.lines = [];
                this.group = new THREE.Group();
                this.init();
            }

            init() {
                const nodeGeo = new THREE.SphereGeometry(0.5, 16, 16);
                
                for (let i = 0; i < NODE_COUNT; i++) {
                    const state = Math.floor(Math.random() * 3);
                    const color = this.getColorForState(state);
                    
                    const mat = new THREE.MeshBasicMaterial({ 
                        color: color,
                        transparent: true,
                        opacity: 0.8
                    });

                    const node = new THREE.Mesh(nodeGeo, mat);
                    node.position.set(
                        (Math.random() - 0.5) * 80,
                        (Math.random() - 0.5) * 80,
                        (Math.random() - 0.5) * 40
                    );
                    
                    node.userData = {
                        state: state,
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.05,
                            (Math.random() - 0.5) * 0.05,
                            (Math.random() - 0.5) * 0.05
                        ),
                        originalScale: 1
                    };

                    this.nodes.push(node);
                    this.group.add(node);
                }

                // Initial Connections
                this.updateConnections();
                scene.add(this.group);
            }

            getColorForState(state) {
                if (state === 0) return COLORS.cyan;       // Active
                if (state === 1) return COLORS.cyberYellow; // Processing
                if (state === 2) return COLORS.red;         // Threat
                return COLORS.amber;
            }

            updateConnections() {
                // Simplified connection logic: connect nearby nodes
                if (this.lineMesh) this.group.remove(this.lineMesh);

                const positions = [];
                const colors = [];
                const maxDist = 20;

                for (let i = 0; i < this.nodes.length; i++) {
                    for (let j = i + 1; j < this.nodes.length; j++) {
                        const dist = this.nodes[i].position.distanceTo(this.nodes[j].position);
                        if (dist < maxDist) {
                            positions.push(
                                this.nodes[i].position.x, this.nodes[i].position.y, this.nodes[i].position.z,
                                this.nodes[j].position.x, this.nodes[j].position.y, this.nodes[j].position.z
                            );
                            
                            const c1 = new THREE.Color(this.nodes[i].material.color);
                            const c2 = new THREE.Color(this.nodes[j].material.color);
                            
                            colors.push(c1.r, c1.g, c1.b, c2.r, c2.g, c2.b);
                        }
                    }
                }

                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                
                const mat = new THREE.LineBasicMaterial({ 
                    vertexColors: true, 
                    transparent: true, 
                    opacity: 0.2 
                });
                
                this.lineMesh = new THREE.LineSegments(geo, mat);
                this.group.add(this.lineMesh);
            }

            update(time, mouse) {
                this.nodes.forEach((node, i) => {
                    // Drift
                    node.position.add(node.userData.velocity);

                    // Boundaries
                    if (Math.abs(node.position.x) > 40) node.userData.velocity.x *= -1;
                    if (Math.abs(node.position.y) > 40) node.userData.velocity.y *= -1;
                    if (Math.abs(node.position.z) > 20) node.userData.velocity.z *= -1;

                    // Pulsing
                    const pulse = 1 + Math.sin(time * 2 + i) * 0.2;
                    node.scale.set(pulse, pulse, pulse);

                    // Mouse Interaction
                    const distToMouse = node.position.distanceTo(mouse);
                    if (distToMouse < 15) {
                        node.position.lerp(mouse, 0.01);
                    }
                });

                this.updateConnections();
                this.group.rotation.y += 0.001;
                this.group.rotation.x += 0.0005;
            }
        }

        const network = new NeuralNetwork();

        // --- Mouse / Parallax ---
        const mouse = new THREE.Vector3();
        const targetMouse = new THREE.Vector3();
        window.addEventListener('mousemove', (e) => {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Map to 3D space
            const vector = new THREE.Vector3(targetMouse.x, targetMouse.y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            mouse.copy(camera.position).add(dir.multiplyScalar(distance));
        });

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            network.update(time * 0.001, mouse);
            
            // Subtle camera parallax
            camera.position.x += (targetMouse.x * 5 - camera.position.x) * 0.05;
            camera.position.y += (targetMouse.y * 5 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }
        animate(0);

        // --- Chat UI Logic ---
        const input = document.getElementById('user-input');
        const output = document.getElementById('chat-output');
        const sendBtn = document.getElementById('send-btn');
        const statLat = document.getElementById('stat-lat');

        function addMessage(text, isAi = false) {
            const div = document.createElement('div');
            div.className = 'message ' + (isAi ? 'ai-message' : 'user-message');
            div.textContent = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function handleSend() {
            const val = input.value.trim();
            if (!val) return;
            addMessage(val, false);
            input.value = '';

            // Simulate response
            setTimeout(() => {
                const responses = [
                    "CYPHER: ACCESS GRANTED. PROCESSING NEURAL DATA...",
                    "CYPHER: THREAT LEVEL STABLE. CONTINUING MONITORING.",
                    "CYPHER: OPTIMIZING GRID LAYOUT FOR MAXIMUM THROUGHPUT.",
                    "CYPHER: NEURAL MAPPING UPDATED. 3-STATE SYNC SUCCESSFUL."
                ];
                addMessage(responses[Math.floor(Math.random() * responses.length)], true);
            }, 1000);
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        // Dummy stats
        setInterval(() => {
            statLat.textContent = (Math.random() * 20 + 5).toFixed(2) + 'ms';
        }, 2000);

    </script>
</body>
</html>
