  :root {
    --cyber-yellow: #ffff00;
    --amber: #ff8c00;
    --orange: #ff4500;
    --obsidian: #0d0d0d;
  }
  /* Restore the scanline and grid styling globally over the React app */
  body::before {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));

    background-size: 100% 4px, 3px 100%;
    pointer-events: none;
  }
  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
      linear-gradient(rgba(255, 140, 0, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 140, 0, 0.05) 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: -1;
    pointer-events: none;
  }
  /* Ensure the React app colors match Amber Core */
  #root {
    background-color: var(--obsidian) !important;
  }
