<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYPHER // Interface</title>
    <style>
        :root {
            --bg-color: #0d0905;
            --panel-bg: #140d05;
            --text-main: #ffcc00; /* Yellow */
            --text-dim: #ff6600;  /* Orange */
            --border-neon: #ffaa00;
            --user-msg: rgba(255, 204, 0, 0.05);
            --bot-msg: rgba(255, 102, 0, 0.08);
            --font-stack: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(255, 102, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 102, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            padding: 25px;
            border-right: 1px solid var(--text-dim);
            box-shadow: inset -2px 0 15px rgba(255, 102, 0, 0.1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar h2 { 
            margin-top: 0; 
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 1px solid var(--text-dim);
            padding-bottom: 15px;
            text-shadow: 0 0 10px var(--text-main);
            text-align: center;
        }

        /* 3D Skull Animation Container */
        .skull-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            height: 120px;
            perspective: 500px;
        }

        .skull {
            width: 80px;
            height: 80px;
            fill: var(--text-main);
            filter: drop-shadow(0 0 8px var(--text-dim));
            transition: all 0.3s ease;
            transform-style: preserve-3d;
            animation: idle-breathe 4s infinite ease-in-out;
        }

        /* Skull States */
        .skull.typing {
            fill: #ffee66;
            filter: drop-shadow(0 0 15px var(--text-main));
            animation: type-shake 0.2s infinite;
        }

        .skull.thinking {
            fill: var(--text-dim);
            filter: drop-shadow(0 0 20px #ff3300) drop-shadow(0px 10px 0px rgba(255,204,0,0.5)); /* 3D Stack Effect */
            animation: think-pulse 0.8s infinite alternate ease-in-out;
        }

        /* Keyframes for Skull */
        @keyframes idle-breathe {
            0%, 100% { transform: scale(1) translateY(0); filter: drop-shadow(0 0 5px var(--text-dim)); }
            50% { transform: scale(1.05) translateY(-5px); filter: drop-shadow(0 0 15px var(--text-main)); }
        }

        @keyframes type-shake {
            0% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(2px) rotate(1deg); }
            50% { transform: translateX(0) rotate(0deg); }
            75% { transform: translateX(-2px) rotate(-1deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        @keyframes think-pulse {
            0% { transform: scale(1) rotateX(10deg); filter: drop-shadow(0 0 10px #ff3300) drop-shadow(0px 5px 0px rgba(255,204,0,0.5)); }
            100% { transform: scale(1.2) rotateX(-10deg); filter: drop-shadow(0 0 30px #ffcc00) drop-shadow(0px 15px 0px rgba(255,102,0,0.8)); }
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 11px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }
        
        input[type="password"], select, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--text-dim);
            border-radius: 0;
            background-color: #000;
            color: var(--text-main);
            box-sizing: border-box;
            font-family: var(--font-stack);
            transition: all 0.3s ease;
        }

        input[type="password"]:focus, select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--text-main);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        .controls { display: flex; gap: 10px; margin-top: 10px;}
        .controls button { padding: 8px; font-size: 10px; flex: 1; }

        /* Chat Container Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-box {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .message {
            max-width: 85%;
            padding: 15px 25px;
            line-height: 1.6;
            white-space: pre-wrap;
            border-radius: 2px;
            border: 1px solid rgba(255, 102, 0, 0.1);
        }

        .message.user {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-right: 3px solid var(--text-main);
            text-align: right;
        }

        .message.assistant {
            background-color: var(--bot-msg);
            align-self: flex-start;
            border-left: 3px solid var(--text-dim);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
        }

        .message.system-hidden { display: none; }

        .message-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
            opacity: 0.9;
            font-weight: bold;
        }

        /* Input Area Styles */
        .chat-input-area {
            padding: 25px 40px;
            border-top: 1px solid var(--text-dim);
            background-color: rgba(13, 9, 5, 0.95);
            display: flex;
            gap: 15px;
        }

        button {
            padding: 0 30px;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-dim);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: var(--font-stack);
            transition: all 0.2s ease;
        }

        button:hover { 
            border-color: var(--text-main);
            background-color: rgba(255, 204, 0, 0.1); 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }
        
        button:disabled { 
            border-color: #555;
            color: #555;
            cursor: not-allowed; 
            background-color: transparent;
            box-shadow: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-main); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CYPHER</h2>

        <div class="skull-container">
            <svg class="skull" id="cypher-skull" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10 C30 10 15 25 15 45 C15 58 22 68 30 75 L30 90 L40 90 L40 85 L60 85 L60 90 L70 90 L70 75 C78 68 85 58 85 45 C85 25 70 10 50 10 Z M35 55 C29 55 25 50 25 45 C25 40 29 35 35 35 C41 35 45 40 45 45 C45 50 41 55 35 55 Z M65 55 C59 55 55 50 55 45 C55 40 59 35 65 35 C71 35 75 40 75 45 C75 50 71 55 65 55 Z M50 70 C45 70 42 65 42 65 L58 65 C58 65 55 70 50 70 Z" />
            </svg>
        </div>
        
        <div class="input-group">
            <label for="api-key">Cypher Link Token:</label>
            <input type="password" id="api-key" placeholder="Enter token...">
        </div>
        
        <div class="input-group">
            <label for="model-select">Active Subroutine:</label>
            <select id="model-select">
                <option value="llama-3.3-70b-versatile">Cypher-Nexus (Flagship)</option>
                <option value="openai/gpt-oss-120b">Cypher-Logic (Reasoning)</option>
                <option value="llama-3.1-8b-instant">Cypher-Pulse (Instant)</option>
                <option value="meta-llama/llama-4-scout-17b-16e-instruct">Cypher-Vanguard (Context)</option>
            </select>
        </div>

        <div class="controls">
            <button onclick="clearMemory()">Wipe Memory</button>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-box" id="chat-box">
            </div>
        
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="> XAVIER, await input..." onkeypress="handleKeyPress(event)" oninput="handleTyping()">
            <button id="send-btn" onclick="sendMessage()">TRANSMIT</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const skull = document.getElementById('cypher-skull');
        
        let typingTimeout;
        const systemPrompt = "You are Cypher, an advanced, highly intelligent cybernetic AI system. Your tone is sharp, analytical, and slightly edgy, fitting a cyberpunk aesthetic. The user's name is Xavier. Address him respectfully but maintaining your AI persona. Do not mention Groq.";

        // Load history from LocalStorage or initialize with system prompt
        let chatHistory = JSON.parse(localStorage.getItem('cypher_history')) || [
            { role: 'system', content: systemPrompt }
        ];

        // Render saved history on load
        function renderHistory() {
            chatBox.innerHTML = '';
            
            // Add a welcome message if it's a new conversation
            if (chatHistory.length === 1) {
                appendMessage("Initialization complete. Awaiting input stream from XAVIER.", 'assistant');
            }

            chatHistory.forEach(msg => {
                if (msg.role !== 'system') {
                    appendMessage(msg.content, msg.role, false);
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Wipe memory function
        function clearMemory() {
            if(confirm("Are you sure you want to wipe Cypher's memory?")) {
                chatHistory = [{ role: 'system', content: systemPrompt }];
                localStorage.setItem('cypher_history', JSON.stringify(chatHistory));
                renderHistory();
            }
        }

        // Skull Typing reaction
        function handleTyping() {
            skull.className = 'skull typing';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                skull.className = 'skull'; // Revert to idle
            }, 500);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function appendMessage(content, role, save = true) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            
            const header = document.createElement('span');
            header.classList.add('message-header');
            header.textContent = role === 'user' ? 'XAVIER // CLIENT' : 'CYPHER // CORE';
            
            const textNode = document.createTextNode(content);
            
            msgDiv.appendChild(header);
            msgDiv.appendChild(document.createElement('br'));
            msgDiv.appendChild(textNode);
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (save) {
                chatHistory.push({ role: role, content: content });
                localStorage.setItem('cypher_history', JSON.stringify(chatHistory));
            }
        }

        async function sendMessage() {
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;
            const text = userInput.value.trim();

            if (!apiKey) {
                alert("ERR: Link Token Required.");
                return;
            }

            if (!text) return;

            // Operator Message
            appendMessage(text, 'user');
            userInput.value = '';
            
            // UI State change
            userInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = 'ROUTING...';
            skull.className = 'skull thinking'; // Trigger 3D thinking animation

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: chatHistory
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || 'Link Disconnected');
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                appendMessage(assistantMessage, 'assistant');

            } catch (error) {
                appendMessage(`SYS_ERR: ${error.message}`, 'assistant');
                console.error("Cypher Link Error:", error);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'TRANSMIT';
                skull.className = 'skull'; // Revert to idle
                userInput.focus();
            }
        }

        // Initialize UI on load
        window.onload = renderHistory;
    </script>
</body>
</html>
